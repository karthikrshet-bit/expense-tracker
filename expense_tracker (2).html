<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💸 Spend</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --card: #1c1c27;
  --border: #2a2a3d;
  --accent: #c8f04d;
  --accent2: #ff6b6b;
  --accent3: #6bffd8;
  --text: #f0f0f5;
  --muted: #6b6b85;
  --income-bg: rgba(107,255,216,0.08);
  --expense-bg: rgba(255,107,107,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 30px 16px 60px;
}
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
body::before { width:400px;height:400px;background:rgba(200,240,77,0.06);top:-100px;left:-100px; }
body::after  { width:350px;height:350px;background:rgba(107,107,255,0.07);bottom:0;right:-80px; }

.app { width:100%;max-width:420px;position:relative;z-index:1; }

/* HEADER */
.header { display:flex;justify-content:space-between;align-items:center;margin-bottom:28px; }
.header h1 { font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-0.5px; }
.header h1 span { color:var(--accent); }
.tag { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted); }

/* BALANCE CARD */
.balance-card { background:var(--accent);border-radius:24px;padding:28px 24px;margin-bottom:16px;position:relative;overflow:hidden; }
.balance-card::before { content:'';position:absolute;width:200px;height:200px;background:rgba(0,0,0,0.07);border-radius:50%;top:-60px;right:-60px; }
.balance-card::after  { content:'';position:absolute;width:120px;height:120px;background:rgba(0,0,0,0.05);border-radius:50%;bottom:-40px;left:40px; }
.balance-label { font-size:13px;font-weight:500;color:rgba(0,0,0,0.5);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase; }
.balance-amount { font-family:'Syne',sans-serif;font-size:46px;font-weight:800;color:#0a0a0f;letter-spacing:-2px;line-height:1;position:relative;z-index:1; }
.balance-amount span { font-size:24px; }

/* STATS */
.stats { display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px; }
.stat-card { background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px; }
.stat-card.income { border-color:rgba(107,255,216,0.2); }
.stat-card.expense { border-color:rgba(255,107,107,0.2); }
.stat-icon { font-size:20px;margin-bottom:8px; }
.stat-label { font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px; }
.stat-amount { font-family:'Syne',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.5px; }
.stat-card.income .stat-amount { color:var(--accent3); }
.stat-card.expense .stat-amount { color:var(--accent2); }

/* CHARTS SECTION */
.charts-section { background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;margin-bottom:28px; }
.chart-tabs { display:flex;gap:8px;margin-bottom:20px; }
.chart-tab {
  flex:1;padding:9px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;width:100%;
}
.chart-tab.active { background:rgba(200,240,77,0.1);border-color:var(--accent);color:var(--accent); }
.chart-panel { display:none; }
.chart-panel.active { display:block; }
.chart-title { font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:4px; }
.chart-subtitle { font-size:11px;color:var(--muted);margin-bottom:20px; }
.chart-wrap { position:relative;height:220px;display:flex;align-items:center;justify-content:center; }
.chart-wrap canvas { max-height:220px; }

/* Pie legend */
.pie-legend { display:flex;flex-wrap:wrap;gap:8px;margin-top:16px; }
.legend-item { display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted); }
.legend-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }

/* Bar chart no-data */
.no-data { text-align:center;color:var(--muted);font-size:13px;padding:40px 0; }

/* ADD SECTION */
.add-section { background:var(--card);border:1px solid var(--border);border-radius:24px;padding:24px;margin-bottom:28px; }
.section-title { font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px;color:var(--text); }
.input-group { margin-bottom:12px; }
.input-group label { display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px; }
.input-group input {
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;
  outline:none;transition:border-color .2s;
}
.input-group input:focus { border-color:var(--accent); }
.input-group input::placeholder { color:var(--muted); }
.type-toggle { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
.type-btn {
  padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;width:100%;
}
.type-btn.active.income-btn { background:var(--income-bg);border-color:var(--accent3);color:var(--accent3); }
.type-btn.active.expense-btn { background:var(--expense-bg);border-color:var(--accent2);color:var(--accent2); }
.add-btn {
  width:100%;padding:14px;background:var(--accent);color:#0a0a0f;border:none;border-radius:14px;
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;
}
.add-btn:hover { transform:translateY(-1px);box-shadow:0 8px 20px rgba(200,240,77,0.25); }
.add-btn:active { transform:translateY(0); }

/* HISTORY */
.history-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:16px; }
.clear-btn {
  font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);
  border-radius:8px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;width:auto;
}
.clear-btn:hover { color:var(--accent2);border-color:var(--accent2); }
.date-group { margin-bottom:20px; }
.date-label-row { display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px; }
.date-label { font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted); }
.date-net { font-size:12px;font-family:'Syne',sans-serif;font-weight:700; }
.txn-item {
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;
  margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:slideIn .3s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.txn-icon { width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
.txn-icon.plus { background:var(--income-bg); }
.txn-icon.minus { background:var(--expense-bg); }
.txn-info { flex:1;min-width:0; }
.txn-desc { font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.txn-time { font-size:11px;color:var(--muted); }
.txn-right { display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0; }
.txn-amount { font-family:'Syne',sans-serif;font-weight:700;font-size:16px; }
.txn-amount.plus { color:var(--accent3); }
.txn-amount.minus { color:var(--accent2); }
.del-btn { background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;width:auto;line-height:1;transition:color .2s; }
.del-btn:hover { color:var(--accent2); }
.empty-state { text-align:center;padding:40px 20px;color:var(--muted); }
.empty-state .emoji { font-size:40px;margin-bottom:12px; }
.empty-state p { font-size:14px;line-height:1.6; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>spend<span>.</span></h1>
    <div class="tag">₹ tracker</div>
  </div>

  <!-- Balance -->
  <div class="balance-card">
    <div class="balance-label">Total Balance</div>
    <div class="balance-amount"><span>₹</span><span id="balance">0.00</span></div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card income">
      <div class="stat-icon">📈</div>
      <div class="stat-label">Income</div>
      <div class="stat-amount" id="money-plus">₹0.00</div>
    </div>
    <div class="stat-card expense">
      <div class="stat-icon">📉</div>
      <div class="stat-label">Spent</div>
      <div class="stat-amount" id="money-minus">₹0.00</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-section">
    <div class="chart-tabs">
      <button class="chart-tab active" onclick="switchChart('weekly')">📅 This Week</button>
      <button class="chart-tab" onclick="switchChart('monthly')">🗓️ This Month</button>
    </div>

    <!-- Weekly pie -->
    <div class="chart-panel active" id="panel-weekly">
      <div class="chart-title">Weekly Breakdown</div>
      <div class="chart-subtitle">Income vs Expenses — last 7 days</div>
      <div class="chart-wrap">
        <canvas id="weeklyChart"></canvas>
      </div>
      <div class="pie-legend" id="weekly-legend"></div>
    </div>

    <!-- Monthly pie -->
    <div class="chart-panel" id="panel-monthly">
      <div class="chart-title">Monthly Breakdown</div>
      <div class="chart-subtitle">Income vs Expenses — this month</div>
      <div class="chart-wrap">
        <canvas id="monthlyChart"></canvas>
      </div>
      <div class="pie-legend" id="monthly-legend"></div>
    </div>
  </div>

  <!-- Add Transaction -->
  <div class="add-section">
    <div class="section-title">+ New Transaction</div>
    <div class="type-toggle">
      <button class="type-btn income-btn active" id="incomeBtn" onclick="setType('income')">💚 Income</button>
      <button class="type-btn expense-btn" id="expenseBtn" onclick="setType('expense')">🔴 Expense</button>
    </div>
    <div class="input-group">
      <label>Description</label>
      <input type="text" id="text" placeholder="e.g. Salary, Zomato, Uber..." />
    </div>
    <div class="input-group">
      <label>Amount (₹)</label>
      <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
    </div>
    <button class="add-btn" onclick="addTransaction()">Add Transaction</button>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <div class="section-title" style="margin-bottom:0">History</div>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>
    <div id="history-list"></div>
  </div>

</div>

<script>
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let currentType = 'income';
let weeklyChartInstance = null;
let monthlyChartInstance = null;

// ── Type toggle ──────────────────────────────────────────
function setType(type) {
  currentType = type;
  document.getElementById('incomeBtn').classList.toggle('active', type === 'income');
  document.getElementById('expenseBtn').classList.toggle('active', type === 'expense');
}

// ── Chart tabs ───────────────────────────────────────────
function switchChart(tab) {
  document.querySelectorAll('.chart-tab').forEach((b,i) => b.classList.toggle('active', i === (tab==='weekly'?0:1)));
  document.getElementById('panel-weekly').classList.toggle('active', tab==='weekly');
  document.getElementById('panel-monthly').classList.toggle('active', tab==='monthly');
}

// ── Pie chart helper ─────────────────────────────────────
const PIE_COLORS = {
  income:  '#6bffd8',
  expense: '#ff6b6b',
  empty:   '#2a2a3d'
};

function buildPie(canvasId, legendId, income, expense) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const existingInstance = canvasId === 'weeklyChart' ? weeklyChartInstance : monthlyChartInstance;
  if (existingInstance) existingInstance.destroy();

  const noData = income === 0 && expense === 0;
  const data   = noData ? [1] : [income, expense].filter(v => v > 0);
  const labels = noData ? ['No data'] : [income>0?'Income':null, expense>0?'Expense':null].filter(Boolean);
  const colors = noData ? [PIE_COLORS.empty] : [income>0?PIE_COLORS.income:null, expense>0?PIE_COLORS.expense:null].filter(Boolean);

  const chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors,
        borderColor: '#0a0a0f',
        borderWidth: 3,
        hoverOffset: 8
      }]
    },
    options: {
      cutout: '70%',
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          enabled: !noData,
          callbacks: {
            label: ctx => ` ₹${ctx.parsed.toFixed(2)}`
          },
          backgroundColor: '#1c1c27',
          titleColor: '#f0f0f5',
          bodyColor: '#c8f04d',
          borderColor: '#2a2a3d',
          borderWidth: 1,
          padding: 10,
          titleFont: { family: 'Syne', weight: '700' },
          bodyFont:  { family: 'DM Sans' }
        }
      },
      animation: { animateRotate: true, duration: 600 }
    },
    plugins: [{
      id: 'centerText',
      afterDraw(chart) {
        if (noData) return;
        const { ctx, chartArea: { left, top, right, bottom } } = chart;
        const cx = (left + right) / 2;
        const cy = (top + bottom) / 2;
        const net = income - expense;
        const color = net >= 0 ? PIE_COLORS.income : PIE_COLORS.expense;
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#6b6b85';
        ctx.font = '11px DM Sans';
        ctx.fillText('NET', cx, cy - 14);
        ctx.fillStyle = color;
        ctx.font = 'bold 16px Syne';
        const sign = net >= 0 ? '+' : '-';
        ctx.fillText(`${sign}₹${Math.abs(net).toFixed(0)}`, cx, cy + 6);
        ctx.restore();
      }
    }]
  });

  if (canvasId === 'weeklyChart') weeklyChartInstance = chart;
  else monthlyChartInstance = chart;

  // Legend
  const legend = document.getElementById(legendId);
  if (noData) {
    legend.innerHTML = `<div class="legend-item"><span style="font-size:12px;color:var(--muted)">No transactions in this period yet.</span></div>`;
  } else {
    legend.innerHTML = [
      income  > 0 ? `<div class="legend-item"><div class="legend-dot" style="background:${PIE_COLORS.income}"></div>Income &nbsp;<strong style="color:var(--text)">₹${income.toFixed(2)}</strong></div>` : '',
      expense > 0 ? `<div class="legend-item"><div class="legend-dot" style="background:${PIE_COLORS.expense}"></div>Expense &nbsp;<strong style="color:var(--text)">₹${expense.toFixed(2)}</strong></div>` : ''
    ].join('');
  }
}

// ── Chart data computation ────────────────────────────────
function updateCharts() {
  const now = new Date();

  // Weekly: last 7 days
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 6); weekAgo.setHours(0,0,0,0);
  const weekly = transactions.filter(t => new Date(t.date) >= weekAgo);
  const wIncome  = weekly.filter(t => t.amount > 0).reduce((a,b) => a + b.amount, 0);
  const wExpense = weekly.filter(t => t.amount < 0).reduce((a,b) => a + Math.abs(b.amount), 0);
  buildPie('weeklyChart', 'weekly-legend', wIncome, wExpense);

  // Monthly: this calendar month
  const monthly = transactions.filter(t => {
    const d = new Date(t.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const mIncome  = monthly.filter(t => t.amount > 0).reduce((a,b) => a + b.amount, 0);
  const mExpense = monthly.filter(t => t.amount < 0).reduce((a,b) => a + Math.abs(b.amount), 0);
  buildPie('monthlyChart', 'monthly-legend', mIncome, mExpense);
}

// ── Core logic ────────────────────────────────────────────
function addTransaction() {
  const textVal   = document.getElementById('text').value.trim();
  const amountVal = parseFloat(document.getElementById('amount').value);
  if (!textVal || isNaN(amountVal) || amountVal <= 0) { alert('Please enter a description and a valid amount.'); return; }
  transactions.push({ id: Date.now(), text: textVal, amount: currentType === 'income' ? amountVal : -amountVal, date: new Date().toISOString() });
  save(); render();
  document.getElementById('text').value = '';
  document.getElementById('amount').value = '';
}

function removeTransaction(id) {
  transactions = transactions.filter(t => t.id !== id);
  save(); render();
}

function clearAll() {
  if (!transactions.length) return;
  if (confirm('Clear all transactions?')) { transactions = []; save(); render(); }
}

function save() { localStorage.setItem('transactions', JSON.stringify(transactions)); }

function formatDate(iso) {
  const d = new Date(iso), today = new Date(), yest = new Date();
  yest.setDate(today.getDate()-1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yest.toDateString())  return 'Yesterday';
  return d.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'long' });
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12:true });
}

function updateValues() {
  const amounts = transactions.map(t => t.amount);
  document.getElementById('balance').textContent    = amounts.reduce((a,b) => a+b, 0).toFixed(2);
  document.getElementById('money-plus').textContent  = '₹' + amounts.filter(a=>a>0).reduce((a,b)=>a+b,0).toFixed(2);
  document.getElementById('money-minus').textContent = '₹' + (amounts.filter(a=>a<0).reduce((a,b)=>a+b,0)*-1).toFixed(2);
}

function render() {
  updateValues();
  updateCharts();

  const container = document.getElementById('history-list');
  if (!transactions.length) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🫙</div><p>No transactions yet.<br>Add one above!</p></div>`;
    return;
  }

  const groups = {};
  [...transactions].reverse().forEach(t => {
    const key = new Date(t.date).toDateString();
    if (!groups[key]) groups[key] = { label: formatDate(t.date), items: [], net: 0 };
    groups[key].items.push(t);
    groups[key].net += t.amount;
  });

  container.innerHTML = '';
  Object.values(groups).forEach(group => {
    const netColor = group.net >= 0 ? '#6bffd8' : '#ff6b6b';
    const netSign  = group.net >= 0 ? '+' : '-';
    const div = document.createElement('div');
    div.className = 'date-group';
    div.innerHTML = `
      <div class="date-label-row">
        <div class="date-label">${group.label}</div>
        <div class="date-net" style="color:${netColor}">${netSign}₹${Math.abs(group.net).toFixed(2)}</div>
      </div>
      ${group.items.map(t => `
        <div class="txn-item">
          <div class="txn-icon ${t.amount>=0?'plus':'minus'}">${t.amount>=0?'💚':'🔴'}</div>
          <div class="txn-info">
            <div class="txn-desc">${t.text}</div>
            <div class="txn-time">${formatTime(t.date)}</div>
          </div>
          <div class="txn-right">
            <div class="txn-amount ${t.amount>=0?'plus':'minus'}">${t.amount>=0?'+':'-'}₹${Math.abs(t.amount).toFixed(2)}</div>
            <button class="del-btn" onclick="removeTransaction(${t.id})">✕</button>
          </div>
        </div>
      `).join('')}
    `;
    container.appendChild(div);
  });
}

render();
</script>
</body>
</html>
